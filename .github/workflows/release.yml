name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      skip_build:
        description: 'Skip build (only bump version)'
        required: false
        type: boolean
        default: false

env:
  GO_VERSION: '1.25'
  NODE_VERSION: '24'
  WAILS_VERSION: 'v3.0.0-alpha2.111'

jobs:
  version-bump:
    name: Bump Version
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.bump_type != ''
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      tag_name: ${{ steps.bump.outputs.tag_name }}
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          # Read current version
          CURRENT_VERSION=$(cat VERSION)
          echo "Current version: $CURRENT_VERSION"

          # Parse version parts
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          # Bump version based on type
          case "${{ github.event.inputs.bump_type }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          TAG_NAME="v${NEW_VERSION}"

          echo "New version: $NEW_VERSION"
          echo "Tag name: $TAG_NAME"

          # Update VERSION file
          echo "$NEW_VERSION" > VERSION

          # Update build/config.yml
          sed -i "s/version: \".*\"/version: \"$NEW_VERSION\"/" build/config.yml

          # Update build/windows/info.json
          sed -i "s/\"file_version\": \".*\"/\"file_version\": \"$NEW_VERSION\"/" build/windows/info.json
          sed -i "s/\"ProductVersion\": \".*\"/\"ProductVersion\": \"$NEW_VERSION\"/" build/windows/info.json

          # Set outputs
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git add VERSION build/config.yml build/windows/info.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          git push origin main

      - name: Create and push tag
        run: |
          git tag ${{ steps.bump.outputs.tag_name }}
          git push origin ${{ steps.bump.outputs.tag_name }}

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: [version-bump]
    if: |
      always() &&
      (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped') &&
      (github.event.inputs.skip_build != 'true')
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.tag_name || github.ref }}

      - name: Get version
        id: version
        run: |
          if [ "${{ needs.version-bump.outputs.tag_name }}" != "" ]; then
            echo "version=${{ needs.version-bump.outputs.tag_name }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "push" ]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=v$(cat VERSION)" >> $GITHUB_OUTPUT
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wails
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Import Code Signing Certificate
        if: github.event_name != 'pull_request'
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        continue-on-error: true

      - name: Build application
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Build with version injected via ldflags
          wails3 task darwin:build \
            BUILD_FLAGS="-ldflags=\"-X main.version=${VERSION}\""
        env:
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 1

      - name: Rename binary
        run: |
          if [ -f "bin/browski" ]; then
            mv "bin/browski" "bin/browski"
          fi

      - name: Sign Application
        if: github.event_name != 'pull_request'
        run: |
          codesign --deep --force --verify --verbose \
            --sign "${{ secrets.MACOS_SIGNING_IDENTITY }}" \
            --options runtime \
            bin/Browski.app
        continue-on-error: true

      - name: Package application
        run: |
          wails3 task darwin:package
        env:
          GOARCH: ${{ matrix.arch }}

      - name: Create DMG (optional)
        run: |
          if [ -d "bin/browski.app" ]; then
            # Create a simple DMG for distribution
            hdiutil create -volname "Browski" -srcfolder bin/browski.app -ov -format UDZO bin/browski-${{ matrix.arch }}.dmg
          fi
        continue-on-error: true

      - name: Notarize Application
        if: github.event_name != 'pull_request' && hashFiles('bin/*.dmg') != ''
        run: |
          if [ -n "${{ secrets.APPLE_ID }}" ] && [ -f bin/*.dmg ]; then
            xcrun notarytool submit bin/*.dmg \
              --apple-id "${{ secrets.APPLE_ID }}" \
              --password "${{ secrets.APPLE_ID_PASSWORD }}" \
              --team-id "${{ secrets.APPLE_TEAM_ID }}" \
              --wait
          fi
        continue-on-error: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: browski-macos-${{ matrix.arch }}
          path: |
            bin/**/*.dmg
            bin/**/*.app

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: [version-bump]
    if: |
      always() &&
      (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped') &&
      (github.event.inputs.skip_build != 'true')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.tag_name || github.ref }}

      - name: Get version
        id: version
        shell: bash
        run: |
          if [ "${{ needs.version-bump.outputs.tag_name }}" != "" ]; then
            echo "version=${{ needs.version-bump.outputs.tag_name }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "push" ]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=v$(cat VERSION)" >> $GITHUB_OUTPUT
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wails
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Install NSIS
        run: |
          choco install nsis -y
          echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Build application
        run: |
          wails3 build

      - name: Rename binary
        shell: bash
        run: |
          if [ -f "bin/browski.exe" ]; then
            mv "bin/browski.exe" "bin/browski.exe"
          fi

      - name: Package application (NSIS)
        run: |
          wails3 task windows:create:nsis:installer

      - name: Package application (MSIX)
        run: |
          wails3 task windows:create:msix:package
        continue-on-error: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: browski-windows-amd64
          path: |
            bin/**/*.exe
            bin/**/*.msix

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: [version-bump]
    if: |
      always() &&
      (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped') &&
      (github.event.inputs.skip_build != 'true')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.tag_name || github.ref }}

      - name: Get version
        id: version
        run: |
          if [ "${{ needs.version-bump.outputs.tag_name }}" != "" ]; then
            echo "version=${{ needs.version-bump.outputs.tag_name }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "push" ]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=v$(cat VERSION)" >> $GITHUB_OUTPUT
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libwebkitgtk-6.0-dev \
            build-essential \
            pkg-config

      - name: Install Wails
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build application
        run: |
          wails3 build

      - name: Rename binary
        run: |
          if [ -f "bin/browski" ]; then
            mv "bin/browski" "bin/browski"
          fi

      - name: Package AppImage
        run: |
          wails3 task linux:create:appimage
        continue-on-error: true

      - name: Package deb
        run: |
          wails3 task linux:create:deb
        continue-on-error: true

      - name: Package rpm
        run: |
          wails3 task linux:create:rpm
        continue-on-error: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: browski-linux-amd64
          path: |
            bin/**/*.AppImage
            bin/**/*.deb
            bin/**/*.rpm
            bin/browski

  create-release:
    name: Create Release
    needs: [version-bump, build-macos, build-windows, build-linux]
    if: |
      always() &&
      (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped') &&
      needs.build-macos.result == 'success' &&
      needs.build-windows.result == 'success' &&
      needs.build-linux.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.tag_name || github.ref }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Get version
        id: version
        run: |
          if [ "${{ needs.version-bump.outputs.tag_name }}" != "" ]; then
            echo "version=${{ needs.version-bump.outputs.tag_name }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "push" ]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=v$(cat VERSION)" >> $GITHUB_OUTPUT
          fi

      - name: Generate release notes
        id: notes
        run: |
          cat > release_notes.md << 'EOF'
          ## What's New

          Cross-platform browser profile picker with support for:
          - Safari, Chrome, Edge, Arc, Brave, Opera, Vivaldi, Firefox
          - Profile management and selection
          - System tray integration
          - Native icon extraction on macOS
          - Single instance with IPC communication

          ## Installation

          ### macOS
          Download `browski-macos-[arch].dmg` and drag to Applications.

          ### Windows
          Download and run `browski-windows-amd64-setup.exe`.

          ### Linux
          Download and run the AppImage, or install the .deb/.rpm package.

          ## Changes

          See full changelog in commit history.
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Browski ${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.app
            artifacts/**/*.exe
            artifacts/**/*.msix
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
