name: CI

on:
  push:
    branches: [ main, master, redesign ]
  pull_request:
    branches: [ main, master, redesign ]

env:
  GO_VERSION: '1.25'
  NODE_VERSION: '24'
  WAILS_VERSION: 'v3.0.0-alpha2.111'

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libwebkitgtk-6.0-dev \
            build-essential \
            pkg-config

      - name: Install Wails
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Run Go tests
        run: go test -v ./...

      - name: Build application
        run: wails3 build

      - name: Rename binary
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            if [ -f "bin/browski.exe" ]; then
              mv "bin/browski.exe" "bin/browski.exe"
            fi
          else
            if [ -f "bin/browski" ]; then
              mv "bin/browski" "bin/browski"
            fi
          fi

      - name: Verify binary exists
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            test -f bin/browski.exe
          else
            test -f bin/browski
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
        continue-on-error: true  # golangci-lint doesn't support Go 1.25 yet

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Lint frontend
        run: |
          cd frontend
          npm run lint --if-present || echo "No lint script found"
